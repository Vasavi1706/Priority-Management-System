<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Registration Page</title>
        <link rel="stylesheet" href="{{url_for('static', filename='register.css') }}">
       
        <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">

    </head>

    <body>
        <div class="wrapper">
            <form action="/register" method="POST">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Enter your RollNo." name="rollNo" required>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Email id" id="email" name="email" required>
                    <i class='bx bx-user'></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" id="password" name="password" required>
                    <i class='bx bx-lock-keyhole'></i>
                </div>
                <button type="submit" class="btn">Register</button>

                <div>
                    <a href="/login">Registration Done!! Go to Login Page</a>
                </div>
            </form>
        </div>
    </body>

</html>
